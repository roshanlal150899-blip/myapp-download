<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Download</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 380px;
            width: 90%;
        }
        .icon { font-size: 60px; margin-bottom: 15px; }
        h1 { color: #1a1a2e; font-size: 24px; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .btn {
            background: linear-gradient(135deg, #4CAF50, #2e7d32);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            width: 100%;
        }
        .info { margin-top: 20px; font-size: 12px; color: #999; }
        .debug { margin-top: 15px; font-size: 11px; color: #aaa; word-break: break-all; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📱</div>
        <h1>App Download Karo</h1>
        <p>Neeche button dabao aur app install karo</p>
        <a class="btn" id="downloadBtn" href="#">⬇️ Download Karo</a>
        <div class="info">Version 1.0</div>
        <div class="debug" id="debugInfo"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        // Offer18 aff_click_id parameter
        const affClickId = params.get('aff_click_id') || '';
        const subAffId = params.get('sub_aff_id') || '';

        // Debug info
        document.getElementById('debugInfo').innerText = 
            affClickId ? 'Tracking ID: ' + affClickId : 'Direct visit - no tracking';

        // APK URL
        const apkBase = "https://raw.githubusercontent.com/roshanlal150899-blip/myapp-download/main/app-debug.apk";

        // Final URL with tracking params
        const finalURL = affClickId 
            ? apkBase + "?aff_click_id=" + affClickId + "&sub_aff_id=" + subAffId
            : apkBase;

        document.getElementById('downloadBtn').href = finalURL;
    </script>
</body>
</html>
